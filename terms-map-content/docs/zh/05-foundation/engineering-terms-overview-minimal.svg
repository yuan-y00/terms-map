<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">现代工程术语地图</title>
  <desc id="desc">用彩色分区展示工程术语牵到的知识方向。</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2f261f" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="topBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C4513B"/>
      <stop offset="0.28" stop-color="#4A6FA5"/>
      <stop offset="0.54" stop-color="#5B8C6F"/>
      <stop offset="0.78" stop-color="#8A6F3D"/>
      <stop offset="1" stop-color="#B75D7D"/>
    </linearGradient>
    <style>
      .bg { fill: #f7f2ea; }
      .panel { fill: #fffdf8; stroke: #e6dacb; stroke-width: 2; filter: url(#softShadow); }
      .title { font: 900 34px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .sub { font: 500 17px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #68717c; }
      .card { stroke-width: 2; filter: url(#softShadow); }
      .h { font: 900 24px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1d242c; }
      .p { font: 600 16px "JetBrains Mono", "Consolas", monospace; fill: #26313d; }
      .s { font: 500 15px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #58636f; }
      .label { font: 900 15px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #fff; }
      .baseH { font: 900 18px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .baseP { font: 500 14px "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #65707b; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <rect x="46" y="42" width="1188" height="676" rx="24" class="panel"/>
  <rect x="46" y="42" width="1188" height="8" rx="4" fill="url(#topBand)"/>

  <text x="86" y="102" class="title">现代工程术语地图</text>
  <text x="86" y="134" class="sub">看到一个词，先看它大概落在哪个工程方向，再顺手补相关知识。</text>

  <g>
    <rect x="86" y="178" width="346" height="188" rx="20" fill="#fff0ea" stroke="#c4513b" class="card"/>
    <rect x="112" y="204" width="120" height="34" rx="17" fill="#c4513b"/>
    <text x="172" y="227" text-anchor="middle" class="label">电机 / 电源</text>
    <text x="112" y="270" class="h">电怎么转换和驱动</text>
    <text x="112" y="306" class="p">BLDC · FOC · ESC · PWM</text>
    <text x="112" y="334" class="p">Inverter · MOSFET · IGBT</text>
    <text x="112" y="356" class="s">电压电流、电磁、转动、反馈控制</text>
  </g>

  <g>
    <rect x="466" y="178" width="346" height="188" rx="20" fill="#eef4fb" stroke="#4a6fa5" class="card"/>
    <rect x="492" y="204" width="116" height="34" rx="17" fill="#4a6fa5"/>
    <text x="550" y="227" text-anchor="middle" class="label">电路 / 信号</text>
    <text x="492" y="270" class="h">信号怎么流，接口怎么工作</text>
    <text x="492" y="306" class="p">PCB · RC · Signal · Noise</text>
    <text x="492" y="334" class="p">FFT · ADC · Hot Plug · ESD</text>
    <text x="492" y="356" class="s">电路板、滤波、采样、频率、接口保护</text>
  </g>

  <g>
    <rect x="846" y="178" width="346" height="188" rx="20" fill="#eef7f1" stroke="#5b8c6f" class="card"/>
    <rect x="872" y="204" width="138" height="34" rx="17" fill="#5b8c6f"/>
    <text x="941" y="227" text-anchor="middle" class="label">GPU / AI 硬件</text>
    <text x="872" y="270" class="h">芯片为什么能并行计算</text>
    <text x="872" y="306" class="p">GPU · CUDA · Tensor Core</text>
    <text x="872" y="334" class="p">VRAM · HBM · PCIe</text>
    <text x="872" y="356" class="s">矩阵、显存、总线、芯片结构</text>
  </g>

  <g>
    <rect x="86" y="400" width="536" height="178" rx="20" fill="#f7f1e4" stroke="#8a6f3d" class="card"/>
    <rect x="112" y="426" width="148" height="34" rx="17" fill="#8a6f3d"/>
    <text x="186" y="449" text-anchor="middle" class="label">机器人 / 自动化</text>
    <text x="112" y="492" class="h">代码怎么进入真实世界</text>
    <text x="112" y="524" class="p">MCU · Firmware · RTOS · Sensor</text>
    <text x="112" y="552" class="p">Actuator · PLC · Motion Control</text>
    <text x="112" y="570" class="s">传感器、执行器、实时控制、机器运动</text>
  </g>

  <g>
    <rect x="656" y="400" width="536" height="178" rx="20" fill="#fbeef4" stroke="#b75d7d" class="card"/>
    <rect x="682" y="426" width="148" height="34" rx="17" fill="#b75d7d"/>
    <text x="756" y="449" text-anchor="middle" class="label">半导体 / 制造</text>
    <text x="682" y="492" class="h">芯片和产品怎么被做出来</text>
    <text x="682" y="524" class="p">Wafer · Lithography · Etching</text>
    <text x="682" y="552" class="p">Packaging · SMT · Repair</text>
    <text x="682" y="570" class="s">芯片制造、焊接、测试、故障定位、设备维护</text>
  </g>

  <g>
    <rect x="86" y="618" width="1106" height="62" rx="18" fill="#ffffff" stroke="#e6dacb" stroke-width="2"/>
    <text x="116" y="656" class="baseH">基础学科</text>
    <text x="232" y="656" class="baseP">数学：三角函数、微积分、线性代数、傅里叶、概率</text>
    <text x="554" y="656" class="baseP">物理：力学、电磁、热、波</text>
    <text x="760" y="656" class="baseP">电子：RC/RL、晶体管、电源、电路板</text>
    <text x="1018" y="656" class="baseP">编程：C/C++、Python、调试</text>
  </g>
</svg>
